name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # lire le code source
      packages: write # pousser sur ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # Cache npm entre les runs

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build le bundle Vite
      # VITE_API_BASE_URL est lu depuis le secret du repo GitHub :
      #   Settings → Secrets and variables → Actions → VITE_API_BASE_URL
      - name: Build application
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Login sur ghcr.io avec le GITHUB_TOKEN fourni automatiquement
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère automatiquement deux tags :
      #   - ghcr.io/<owner>/<repo>:latest
      #   - ghcr.io/<owner>/<repo>:main
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main

      # Active Docker BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build et pousse l'image sur ghcr.io
      # Le dossier dist/ a déjà été généré par npm run build ci-dessus
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
