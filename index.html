<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Trading Assistant</title>
    <!--
      Script inline exécuté AVANT le chargement de React.
      But : appliquer la classe "dark" immédiatement sur <html> pour éviter
      un flash de thème incorrect (FOUC — Flash Of Unstyled Content).
      On lit localStorage en synchrone (bloquant), ce qui est acceptable
      car c'est une opération < 1ms.
    -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
