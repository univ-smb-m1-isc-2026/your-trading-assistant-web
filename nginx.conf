server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : toute route non-trouvée renvoie index.html.
    # Nécessaire pour que React Router gère le routing côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif sur /assets/ : Vite génère des noms de fichiers
    # avec hash (ex: index-D5akxSlK.js), donc le contenu ne change
    # jamais pour un même nom — on peut cacher 1 an en toute sécurité.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
